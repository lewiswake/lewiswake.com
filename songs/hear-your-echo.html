<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a0b2e" />

    <title>Lewis Wake - Hear Your Echo | Pre-Save</title>
    <meta
      name="description"
      content="Pre-save Lewis Wake's upcoming single 'Hear Your Echo' on Spotify and Apple Music."
    />

    <link rel="stylesheet" href="../css/screen.css" media="screen" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Page-specific overrides to match your main site's aesthetic */
      .presave-wrapper {
        max-width: 500px; /* Slightly narrower for a focused landing page */
        margin: 0 auto;
      }
      .artwork {
        width: 100%;
        max-width: 350px;
        height: auto;
        border-radius: var(--radius-lg);
        box-shadow:
          0 10px 40px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(255, 255, 255, 0.1);
        margin: 0 auto 20px auto;
        display: block;
      }
      .presave-header {
        text-align: center;
        padding-top: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .presave-header h1 {
        font-size: 2.5rem;
      }

      /* New Brand Gradients for Music Services */
      .brand-spotify {
        background: linear-gradient(135deg, #1ed760 0%, #1db954 100%);
      }
      .brand-apple {
        background: linear-gradient(135deg, #fb5266 0%, #fa243c 100%);
      }
    </style>
  </head>

  <body>
    <div class="aurora-bg" aria-hidden="true"></div>

    <div class="main-wrapper presave-wrapper">
      <main>
        <header class="presave-header">
          <img
            class="artwork"
            src="https://imagestore.ffm.to/link/69c4e8122b00003700cc839d/69c4e8184100004c0027332a_f8fc750a9ec9653dd1742d177c6e027e.jpeg"
            alt="Hear Your Echo Cover Art"
            fetchpriority="high"
          />
          <h1 style="margin-bottom: 8px">Hear Your Echo</h1>
          <h2>Lewis Wake</h2>
        </header>

        <div class="grid-2" style="grid-template-columns: 1fr">
          <a
            href="https://open.spotify.com/album/0VBjmht9oR3LF41GHxG0zd"
            class="glass interactive list-item"
            target="_blank"
            rel="noopener noreferrer"
          >
            <div class="icon-box brand-spotify">
              <img
                src="../images/spotify.svg"
                alt=""
                aria-hidden="true"
                width="32"
                height="32"
                loading="lazy"
              />
            </div>
            <div class="list-text">
              <h4>Spotify</h4>
            </div>
          </a>

          <a
            href="https://music.apple.com/gb/album/hear-your-echo/1887927634?i=1887927635 "
            class="glass interactive list-item"
            target="_blank"
            rel="noopener noreferrer"
          >
            <div class="icon-box brand-apple">
              <img
                src="../images/apple-music.svg"
                alt=""
                aria-hidden="true"
                width="32"
                height="32"
                loading="lazy"
              />
            </div>
            <div class="list-text">
              <h4>Apple Music</h4>
            </div>
          </a>
        </div>
      </main>
    </div>
  </body>
</html>
