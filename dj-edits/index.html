<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lewis Wake | DJ Edit Catalogue</title>

    <link rel="icon" href="favicon/favicon.ico" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="aurora-bg"></div>

    <div class="container">
      <header>
        <h1>Lewis Wake DJ Edits</h1>
        <div class="update-note">
          Last updated: <span id="last-updated-date">...</span>
        </div>
      </header>

      <div id="controls-container">
        <input
          type="text"
          id="artist-filter"
          class="glass-input"
          placeholder="Filter by artist..."
        />
        <nav id="toc" class="glass"></nav>
      </div>

      <div id="content-area"></div>
    </div>

    <a
      href="https://www.patreon.com/lewiswakedj"
      target="_blank"
      class="sticky-cta"
    >
      Unlock All Tracks on Patreon
    </a>

    <script src="script.js"></script>
  </body>
</html>
