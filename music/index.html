<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a0b2e" />

    <title>Lewis Wake | Music</title>
    <meta
      name="description"
      content="Listen to the latest singles and releases from Lewis Wake."
    />
    <meta name="author" content="Lewis Wake" />

    <link rel="stylesheet" href="../css/screen.css" media="screen" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="aurora-bg" aria-hidden="true"></div>

    <div class="main-wrapper">
      <header class="header-music">
        <h1>Music</h1>
      </header>

      <nav class="dock-container" aria-label="Artist Profiles">
        <a
          href="https://music.apple.com/gb/artist/lewis-wake/1535557503"
          class="dock-icon"
          title="Lewis Wake on Apple Music"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img
            src="../images/apple-music.svg"
            alt="Apple Music logo"
            width="24"
            height="24"
          />
        </a>
        <a
          href="https://open.spotify.com/artist/1jwEZgFBty0FTN4OcnM5Uk"
          class="dock-icon"
          title="Lewis Wake on Spotify"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img
            src="../images/spotify.svg"
            alt="Spotify logo"
            width="24"
            height="24"
          />
        </a>
      </nav>

      <main>
        <section aria-labelledby="singles-heading">
          <h2 id="singles-heading">Singles</h2>

          <div class="music-grid">
            <a href="hear-your-echo" class="release-card">
              <img
                class="release-art"
                src="https://imagestore.ffm.to/link/69c4e8122b00003700cc839d/69c4e8184100004c0027332a_f8fc750a9ec9653dd1742d177c6e027e.jpeg"
                alt="Hear Your Echo Cover Art"
                fetchpriority="high"
              />
              <h3 class="release-title">Hear Your Echo</h3>
            </a>
          </div>
        </section>
      </main>

      <footer class="footer-links">
        <p>© 2026 Lewis Wake</p>
        <a href="../index.html">Back to Home</a>
      </footer>
    </div>
  </body>
</html>
