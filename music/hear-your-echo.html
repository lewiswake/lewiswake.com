<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a0b2e" />

    <title>Lewis Wake - Hear Your Echo | Out Now</title>
    <meta
      name="description"
      content="Listen to Lewis Wake's new single 'Hear Your Echo'. Out now and featured on BBC Radio Scotland."
    />

    <link rel="stylesheet" href="../css/screen.css" media="screen" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Page-specific overrides to match your main site's aesthetic */
      .presave-wrapper {
        max-width: 500px; /* Slightly narrower for a focused landing page */
        margin: 0 auto;
      }
      .artwork {
        width: 100%;
        max-width: 350px;
        height: auto;
        border-radius: var(--radius-lg, 16px);
        box-shadow:
          0 10px 40px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(255, 255, 255, 0.1);
        margin: 0 auto 20px auto;
        display: block;
      }
      .presave-header {
        text-align: center;
        padding-top: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .presave-header h1 {
        font-size: 2.5rem;
      }
      
      /* New Elements for Released Track */
      .accomplishments {
        margin: 16px 0 24px 0;
        padding: 12px 20px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        text-align: center;
        backdrop-filter: blur(10px);
      }
      .accomplishments p {
        margin: 0;
        font-size: 0.95rem;
        font-weight: 500;
        color: #e2e8f0;
      }
      .track-meta {
        text-align: center;
        margin-top: 40px;
        padding-bottom: 20px;
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.4);
      }
      .track-meta p {
        margin: 4px 0;
      }

      /* New Brand Gradients for Music Services */
      .brand-spotify {
        background: linear-gradient(135deg, #1ed760 0%, #1db954 100%);
      }
      .brand-apple {
        background: linear-gradient(135deg, #fb5266 0%, #fa243c 100%);
      }
      .brand-deezer {
        background: linear-gradient(135deg, #a238ff 0%, #ef24d6 100%);
      }
      .brand-youtube {
        background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
      }
      .brand-amazon {
        background: linear-gradient(135deg, #00a8e1 0%, #007ba6 100%);
      }
    </style>
  </head>

  <body>
    <div class="aurora-bg" aria-hidden="true"></div>

    <div class="main-wrapper presave-wrapper">
      <main>
        <header class="presave-header">
          <img
            class="artwork"
            src="https://imagestore.ffm.to/link/69c4e8122b00003700cc839d/69c4e8184100004c0027332a_f8fc750a9ec9653dd1742d177c6e027e.jpeg"
            alt="Hear Your Echo Cover Art"
            fetchpriority="high"
          />
          <h1 style="margin-bottom: 8px">Hear Your Echo</h1>
          <h2>Lewis Wake</h2>
          
          <div class="accomplishments">
            <p>📻 As heard on <strong>BBC Radio Scotland</strong></p>
          </div>
        </header>

        <div class="grid-2" style="grid-template-columns: 1fr">
          <a
            href="https://open.spotify.com/album/0VBjmht9oR3LF41GHxG0zd"
            class="glass interactive list-item"
            target="_blank"
            rel="noopener noreferrer"
          >
            <div class="icon-box brand-spotify">
              <img
                src="../images/spotify.svg"
                alt=""
                aria-hidden="true"
                width="32"
                height="32"
                loading="lazy"
              />
            </div>
            <div class="list-text">
              <h4>Spotify</h4>
            </div>
          </a>

          <a
            href="https://music.apple.com/gb/album/hear-your-echo/1887927634?i=1887927635"
            class="glass interactive list-item"
            target="_blank"
            rel="noopener noreferrer"
          >
            <div class="icon-box brand-apple">
              <img
                src="../images/apple-music.svg"
                alt=""
                aria-hidden="true"
                width="32"
                height="32"
                loading="lazy"
              />
            </div>
            <div class="list-text">
              <h4>Apple Music</h4>
            </div>
          </a>

          <a
            href="https://www.deezer.com/us/track/3921205281"
            class="glass interactive list-item"
            target="_blank"
            rel="noopener noreferrer"
          >
            <div class="icon-box brand-deezer">
              <img
                src="../images/deezer.svg"
                alt=""
                aria-hidden="true"
                width="32"
                height="32"
                loading="lazy"
              />
            </div>
            <div class="list-text">
              <h4>Deezer</h4>
            </div>
          </a>

          <a
            href="https://www.youtube.com/watch?v=2f6NLF2cOG8"
            class="glass interactive list-item"
            target="_blank"
            rel="noopener noreferrer"
          >
            <div class="icon-box brand-youtube">
              <img
                src="../images/youtube-music.svg"
                alt=""
                aria-hidden="true"
                width="32"
                height="32"
                loading="lazy"
              />
            </div>
            <div class="list-text">
              <h4>YouTube Music</h4>
            </div>
          </a>

          <a
            href="https://music.amazon.com/tracks/B0GTWS9T28?marketplaceId=ATVPDKIKX0DER&musicTerritory=US&ref=dm_sh_8UxSKsfjevTJF37zvH60e118u"
            class="glass interactive list-item"
            target="_blank"
            rel="noopener noreferrer"
          >
            <div class="icon-box brand-amazon">
              <img
                src="../images/amazon-music.svg"
                alt=""
                aria-hidden="true"
                width="32"
                height="32"
                loading="lazy"
              />
            </div>
            <div class="list-text">
              <h4>Amazon Music</h4>
            </div>
          </a>
        </div>
        
        <footer class="track-meta">
          <p>Released: April 3, 2026</p>
          <p>ISRC: GBMJG2608327 | UPC: 5063930025067</p>
        </footer>
      </main>
    </div>
  </body>
</html>
